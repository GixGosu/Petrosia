<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petrosia Admin - Knowledge Management</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
    }
    
    .container {
      display: flex;
      height: 100vh;
    }
    
    /* Sidebar */
    .sidebar {
      width: 260px;
      background: #2c3e50;
      color: white;
      padding: 24px;
      display: flex;
      flex-direction: column;
    }
    
    .sidebar-header {
      margin-bottom: 32px;
    }
    
    .sidebar-header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .sidebar-header p {
      opacity: 0.7;
      font-size: 13px;
    }
    
    .nav-menu {
      list-style: none;
    }
    
    .nav-item {
      padding: 12px 16px;
      margin-bottom: 4px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .nav-item:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .nav-item.active {
      background: rgba(255,255,255,0.15);
    }
    
    /* Main content */
    .main-content {
      flex: 1;
      overflow: auto;
    }
    
    .header {
      background: white;
      padding: 24px 32px;
      border-bottom: 1px solid #e5e5e7;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h2 {
      font-size: 32px;
      font-weight: 700;
    }
    
    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: #0066FF;
      color: white;
    }
    
    .btn-primary:hover {
      background: #0052CC;
    }
    
    .btn-secondary {
      background: #e5e5e7;
      color: #1d1d1f;
    }
    
    .btn-secondary:hover {
      background: #d1d1d6;
    }
    
    .content-area {
      padding: 32px;
    }
    
    /* Article List */
    .article-grid {
      display: grid;
      gap: 16px;
    }
    
    .article-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #e5e5e7;
    }
    
    .article-card:hover {
      border-color: #0066FF;
      box-shadow: 0 4px 12px rgba(0,102,255,0.1);
    }
    
    .article-card h3 {
      font-size: 20px;
      margin-bottom: 8px;
    }
    
    .article-card-meta {
      display: flex;
      gap: 12px;
      font-size: 13px;
      color: #86868b;
      margin-top: 8px;
    }
    
    .article-languages {
      display: flex;
      gap: 6px;
      margin-top: 12px;
    }
    
    .lang-badge {
      padding: 4px 8px;
      background: #e5e5e7;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    /* Editor */
    .editor-container {
      background: white;
      border-radius: 12px;
      overflow: hidden;
    }
    
    .editor-tabs {
      display: flex;
      background: #f5f5f7;
      border-bottom: 1px solid #e5e5e7;
      padding: 0 24px;
      gap: 8px;
    }
    
    .editor-tab {
      padding: 16px 24px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      font-weight: 600;
      transition: all 0.2s;
      user-select: none;
    }
    
    .editor-tab:hover {
      background: rgba(0,102,255,0.05);
    }
    
    .editor-tab.active {
      border-bottom-color: #0066FF;
      color: #0066FF;
    }
    
    .editor-content {
      padding: 24px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1d1d1f;
    }
    
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #e5e5e7;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }
    
    .form-group textarea {
      min-height: 300px;
      font-family: 'Courier New', monospace;
      resize: vertical;
    }
    
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #0066FF;
    }
    
    .editor-actions {
      display: flex;
      gap: 12px;
      padding: 24px;
      border-top: 1px solid #e5e5e7;
      background: #f5f5f7;
    }
    
    /* Search Test */
    .search-test {
      background: white;
      border-radius: 12px;
      padding: 32px;
    }
    
    .search-input {
      width: 100%;
      padding: 16px;
      border: 2px solid #e5e5e7;
      border-radius: 12px;
      font-size: 16px;
      margin-bottom: 24px;
    }
    
    .search-input:focus {
      outline: none;
      border-color: #0066FF;
    }
    
    .search-results {
      margin-top: 24px;
    }
    
    .search-result-item {
      background: #f5f5f7;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    
    .search-result-title {
      font-weight: 600;
      font-size: 18px;
      margin-bottom: 8px;
    }
    
    .search-result-score {
      display: inline-block;
      padding: 4px 12px;
      background: #0066FF;
      color: white;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .search-result-body {
      color: #666;
      line-height: 1.6;
    }
    
    /* Analytics */
    .analytics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
    }
    
    .stat-card h3 {
      font-size: 14px;
      color: #86868b;
      margin-bottom: 8px;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    
    .stat-card .stat-value {
      font-size: 48px;
      font-weight: 700;
      color: #0066FF;
    }
    
    .recent-questions {
      background: white;
      border-radius: 12px;
      padding: 32px;
    }
    
    .recent-questions h3 {
      font-size: 24px;
      margin-bottom: 24px;
    }
    
    .question-item {
      padding: 16px;
      border-left: 4px solid #0066FF;
      background: #f5f5f7;
      margin-bottom: 12px;
      border-radius: 4px;
    }
    
    .question-text {
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .question-meta {
      font-size: 12px;
      color: #86868b;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #86868b;
    }
    
    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      opacity: 0.3;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #86868b;
    }
    
    .hidden {
      display: none !important;
    }
    
    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .filter-select {
      padding: 10px 16px;
      border: 1px solid #e5e5e7;
      border-radius: 8px;
      font-size: 14px;
      background: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>Petrosia</h1>
        <p>Admin Dashboard</p>
      </div>
      
      <ul class="nav-menu">
        <li class="nav-item active" data-view="articles">📚 Articles</li>
        <li class="nav-item" data-view="search">🔍 Search Test</li>
        <li class="nav-item" data-view="analytics">📊 Analytics</li>
      </ul>
    </div>
    
    <!-- Main Content -->
    <div class="main-content">
      <!-- Articles View -->
      <div id="articles-view" class="view">
        <div class="header">
          <h2>Articles</h2>
          <button class="btn btn-primary" onclick="showEditor()">+ New Article</button>
        </div>
        
        <div class="content-area">
          <div class="filters">
            <select class="filter-select" id="filter-status" onchange="loadArticles()">
              <option value="">All Statuses</option>
              <option value="published">Published</option>
              <option value="draft">Draft</option>
            </select>
            
            <select class="filter-select" id="filter-language" onchange="loadArticles()">
              <option value="">All Languages</option>
              <option value="en">English</option>
              <option value="ja">Japanese</option>
              <option value="de">German</option>
              <option value="fr">French</option>
              <option value="es">Spanish</option>
            </select>
          </div>
          
          <div id="articles-list" class="article-grid">
            <div class="loading">Loading articles...</div>
          </div>
        </div>
      </div>
      
      <!-- Editor View -->
      <div id="editor-view" class="view hidden">
        <div class="header">
          <h2 id="editor-title">Edit Article</h2>
          <button class="btn btn-secondary" onclick="closeEditor()">Close</button>
        </div>
        
        <div class="content-area">
          <div class="editor-container">
            <div class="editor-tabs">
              <div class="editor-tab active" data-lang="en">🇺🇸 English</div>
              <div class="editor-tab" data-lang="ja">🇯🇵 Japanese</div>
              <div class="editor-tab" data-lang="de">🇩🇪 German</div>
            </div>
            
            <div class="editor-content">
              <div class="form-group">
                <label>Slug (URL identifier)</label>
                <input type="text" id="editor-slug" placeholder="example-article">
              </div>
              
              <div class="form-group">
                <label>Title</label>
                <input type="text" id="editor-title-input" placeholder="Article title">
              </div>
              
              <div class="form-group">
                <label>Body (Markdown supported)</label>
                <textarea id="editor-body" placeholder="Write your article content here..."></textarea>
              </div>
            </div>
            
            <div class="editor-actions">
              <button class="btn btn-primary" onclick="saveArticle()">💾 Save (One Click!)</button>
              <button class="btn btn-secondary" onclick="closeEditor()">Cancel</button>
              <span id="save-status" style="margin-left: auto; color: #86868b;"></span>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Search Test View -->
      <div id="search-view" class="view hidden">
        <div class="header">
          <h2>Search Test</h2>
        </div>
        
        <div class="content-area">
          <div class="search-test">
            <h3 style="margin-bottom: 16px;">Test semantic search</h3>
            <input type="text" class="search-input" id="search-query" placeholder="Try: How do I reset my password?" onkeypress="if(event.key==='Enter') performSearch()">
            <button class="btn btn-primary" onclick="performSearch()">Search</button>
            
            <div id="search-results" class="search-results"></div>
          </div>
        </div>
      </div>
      
      <!-- Analytics View -->
      <div id="analytics-view" class="view hidden">
        <div class="header">
          <h2>Analytics</h2>
        </div>
        
        <div class="content-area">
          <div class="analytics-grid">
            <div class="stat-card">
              <h3>Total Articles</h3>
              <div class="stat-value" id="stat-articles">-</div>
            </div>
            
            <div class="stat-card">
              <h3>Languages</h3>
              <div class="stat-value" id="stat-languages">-</div>
            </div>
            
            <div class="stat-card">
              <h3>Recent Questions</h3>
              <div class="stat-value" id="stat-questions">-</div>
            </div>
          </div>
          
          <div class="recent-questions">
            <h3>Recent Questions</h3>
            <div id="recent-questions-list">
              <div class="loading">Loading...</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="/static/admin/app.js"></script>
</body>
</html>
